<header class="site-header">
  <a class="brand" href="{{ "/" | relURL }}" aria-label="{{ site.Title }} home">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" aria-hidden="true">
      <path d="M16 3 L28 16 L16 29 L4 16 Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" />
      <path d="M16 9.5 L22.5 16 L16 22.5 L9.5 16 Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" opacity="0.6" />
      <line x1="16" y1="3" x2="16" y2="29" stroke="currentColor" stroke-width="0.5" opacity="0.45" />
    </svg>
    <span class="brand-name">{{ site.Title }}</span>
  </a>
  <nav class="site-nav" aria-label="Primary">
    {{- range site.Menus.main }}
      <a href="{{ .URL | relURL }}">{{ .Name }}</a>
    {{- end }}
  </nav>
  <a class="btn btn-outline btn-small btn-cta" href="mailto:{{ site.Params.email }}">
    Inquire <span class="arrow" aria-hidden="true">↗</span>
  </a>
</header>
