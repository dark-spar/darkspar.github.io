<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="DarkSpar mark">
  <title>DarkSpar</title>

  <defs>
    <linearGradient id="spar-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b9d6ea" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8fb8d6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="spar-stroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4e5f2"/>
      <stop offset="1" stop-color="#8fb8d6"/>
    </linearGradient>
  </defs>

  <!-- outer crystal -->
  <path
    d="M256 48 L448 256 L256 464 L64 256 Z"
    fill="url(#spar-fill)"
    stroke="url(#spar-stroke)"
    stroke-width="10"
    stroke-linejoin="round"
  />

  <!-- inner crystal -->
  <path
    d="M256 152 L360 256 L256 360 L152 256 Z"
    fill="none"
    stroke="url(#spar-stroke)"
    stroke-width="7"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- vertical spar -->
  <line
    x1="256" y1="48" x2="256" y2="464"
    stroke="url(#spar-stroke)"
    stroke-width="2.5"
    opacity="0.55"
  />

  <!-- facet highlights -->
  <line x1="152" y1="256" x2="64" y2="256" stroke="url(#spar-stroke)" stroke-width="2.5" opacity="0.35"/>
  <line x1="360" y1="256" x2="448" y2="256" stroke="url(#spar-stroke)" stroke-width="2.5" opacity="0.35"/>
</svg>
